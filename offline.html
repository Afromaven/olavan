<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olavan — Offline</title>
    <!-- Your icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/olavan/uploads/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/olavan/uploads/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/olavan/uploads/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .offline-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
        }
        .paw-icon {
            font-size: 64px;
            color: #d35400;
            margin-bottom: 20px;
        }
        h1 {
            margin-bottom: 16px;
            color: #d35400;
        }
        p {
            color: #a0a0a0;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #d35400;
            color: white;
            text-decoration: none;
            border-radius: 16px;
            margin-top: 24px;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #e67e22;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <i class="fas fa-paw paw-icon"></i>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">
            <i class="fas fa-sync-alt"></i> Try Again
        </button>
    </div>
</body>
</html>
